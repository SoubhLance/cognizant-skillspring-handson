version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: lms-mysql-db
    environment:
      MYSQL_DATABASE: library_db
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      # Automatically seed database.sql on container startup
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lms-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql-db
      - DB_PORT=3306
      - DB_NAME=library_db
      - DB_USER=root
      - DB_PASSWORD=password
    depends_on:
      mysql-db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lms-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db-data:
